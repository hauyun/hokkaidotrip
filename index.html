imgs.I="__DATA_I__";
["B","C","D","E","F","G","H","I"].forEach(k=>{imgs[k]="photos/"+k+".jpg";});
const regionMeta={"美瑛":"biei","中富良野":"naka","富良野":"furano","旭川":"asa","十勝／帶廣":"tok"};
const fmt=n=>"$"+n.toLocaleString();
const app=document.getElementById("app");
const order=["美瑛","中富良野","富良野","旭川","十勝／帶廣"];
order.forEach(reg=>{
  const items=data.filter(d=>d.region===reg);
  if(!items.length)return;
  const cls=regionMeta[reg];
  const h=document.createElement("div");
  h.className="region-title";
  h.innerHTML=`<span class="bar" style="background:var(--${cls})"></span>${reg}<span style="font-weight:400;color:var(--sub);font-size:.9rem">（${items.length} 間）</span>`;
  app.appendChild(h);
  const grid=document.createElement("div");grid.className="grid";
  items.forEach(d=>{
    const pp=Math.round(d.total/10);
    const card=document.createElement("div");card.className="card";
    card.innerHTML=`
      <div class="thumbwrap" style="--rc:var(--${d.cls})">
        <div class="ph"><span class="ph-code">${d.code}</span><span class="ph-label">${d.plat}</span></div>
        ${imgs[d.code]?`<img class="thumb" src="${imgs[d.code]}" alt="${d.name}" loading="lazy" referrerpolicy="no-referrer" onerror="this.style.display='none'">`:''}
      </div>
      <div class="top">
        <div class="code" style="background:var(--${d.cls})">${d.code}</div>
        ${d.best?`<div class="best">${d.best}</div>`:""}
        <div class="name">${d.name}</div>
        <span class="plat">${d.plat}</span>
        <div class="price">${fmt(d.total)} <small>/2晚</small></div>
        <div class="pp">每人每晚 約 ${fmt(pp)}</div>
        <div class="rate">★ ${d.rate}</div>
      </div>
      <div class="body">
        <div class="facts">${d.facts.map(f=>`<span class="fact">${f}</span>`).join("")}</div>
        <div class="layout">${d.layout}</div>
        <div style="font-size:.8rem;color:var(--sub);margin-bottom:8px">風格：${d.style}</div>
        <div class="pc pro"><b>優點</b> ${d.pro}</div>
        <div class="pc con"><b>缺點</b> ${d.con}</div>
      </div>
      <div class="foot">
        <a href="${d.url}" target="_blank" rel="noopener">查看房源 →</a>
        <div class="note">${d.note}</div>
      </div>`;
    grid.appendChild(card);
  });
  app.appendChild(grid);
});
</script>
